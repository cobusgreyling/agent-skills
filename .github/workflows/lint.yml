name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Validate SKILL.md files
        run: python scripts/lint_skills.py

      - name: Verify README index is up to date
        run: |
          python scripts/build_index.py
          if ! git diff --exit-code README.md; then
            echo "::error::README.md 'Available Skills' section is stale. Run: python scripts/build_index.py"
            exit 1
          fi
